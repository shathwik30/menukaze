# Local development services for Menukaze.
# Boots Mongo 7 as a 1-node replica set (transactions require replset)
# and Redis 7 for BullMQ + cache + rate-limit + idempotency.
#
# Bring up:   pnpm services:up
# Tear down:  pnpm services:down
# Reset:      pnpm services:reset

services:
  mongo:
    image: mongo:7.0
    container_name: menukaze-mongo
    restart: unless-stopped
    command:
      - --replSet
      - rs0
      - --bind_ip_all
      - --port
      - '27017'
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: |
        mongosh --quiet --eval '
          try {
            rs.status();
          } catch (e) {
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "127.0.0.1:27017" }],
            });
          }
        '
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

  # Bound to 6380 on the host so it coexists with any native Redis on 6379.
  # If you don't already have Redis running natively, change REDIS_URL in
  # your .env.local to redis://127.0.0.1:6380 to use this container.
  redis:
    image: redis:7-alpine
    container_name: menukaze-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - 'yes'
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mongo_data:
  mongo_config:
  redis_data:
